name: CI

on:
  pull_request:
    branches: [donkey-kong-sandbox, main]
  push:
    branches: [donkey-kong-sandbox, main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,live]"
      - name: Run tests
        run: pytest -q
